<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紀沐煦滿四個月了 紀家見面會聚餐</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-bg: #ffffff;
    --color-bg-secondary: #f5f5f3;
    --color-bg-tertiary: #ededea;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #6b6b67;
    --color-text-tertiary: #9e9e99;
    --color-border: rgba(0,0,0,0.12);
    --color-border-strong: rgba(0,0,0,0.25);
    --color-danger: #c0392b;
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --blue: #378ADD;
    --blue-light: #E6F1FB;
    --blue-dark: #185FA5;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1c1c1a;
      --color-bg-secondary: #252522;
      --color-bg-tertiary: #2e2e2b;
      --color-text-primary: #f0efeb;
      --color-text-secondary: #a8a8a3;
      --color-text-tertiary: #6b6b67;
      --color-border: rgba(255,255,255,0.1);
      --color-border-strong: rgba(255,255,255,0.22);
      --green-light: #0d3326;
      --green-dark: #5DCAA5;
      --blue-light: #0c2340;
      --blue-dark: #85B7EB;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: var(--color-bg-tertiary);
    color: var(--color-text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0 0 3rem;
  }

  .container {
    width: 100%;
    max-width: 480px;
    background: var(--color-bg);
    min-height: 100vh;
  }

  .page { display: none; }
  .page.active { display: block; }

  /* Header */
  .header {
    padding: 1.5rem 1.25rem 1.25rem;
    border-bottom: 0.5px solid var(--color-border);
    margin-bottom: 1.5rem;
  }
  .header-tag {
    font-size: 11px;
    color: var(--color-text-tertiary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--color-text-primary);
    line-height: 1.4;
  }
  .header p {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-top: 8px;
    line-height: 1.6;
  }
  .header p strong { font-weight: 600; color: var(--color-text-primary); }

  /* Form */
  .form-body { padding: 0 1.25rem; }

  .field { margin-bottom: 1.375rem; }
  .field > label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 7px;
  }
  .req { color: var(--color-danger); margin-left: 2px; }

  input[type="text"],
  input[type="password"],
  select,
  textarea {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    background: var(--color-bg);
    color: var(--color-text-primary);
    border: 0.5px solid var(--color-border-strong);
    border-radius: var(--radius-md);
    outline: none;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus,
  input[type="password"]:focus,
  select:focus,
  textarea:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(29,158,117,0.12);
  }
  textarea { min-height: 72px; resize: vertical; line-height: 1.5; }

  /* Date cards */
  .date-cards { display: flex; flex-direction: column; gap: 10px; }
  .date-card {
    border: 0.5px solid var(--color-border-strong);
    border-radius: var(--radius-lg);
    padding: 14px;
    cursor: pointer;
    background: var(--color-bg);
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .date-card:active { opacity: 0.85; }
  .date-card.selected {
    border: 1.5px solid var(--green);
    background: var(--green-light);
  }
  .date-card-top { display: flex; align-items: center; gap: 12px; }
  .date-checkbox {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 1.5px solid var(--color-border-strong);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: transparent;
    transition: all 0.15s;
    font-size: 14px;
  }
  .date-card.selected .date-checkbox {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .date-label { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
  .date-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 3px; }

  .date-counts {
    display: none;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 0.5px solid var(--color-border);
    gap: 12px;
  }
  .date-card.selected .date-counts { display: flex; }

  .count-group { flex: 1; }
  .count-group > label {
    font-size: 12px;
    color: var(--color-text-secondary);
    display: block;
    margin-bottom: 6px;
    font-weight: 400;
  }
  .count-row { display: flex; align-items: center; gap: 8px; }
  .count-btn {
    width: 32px; height: 32px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--color-border-strong);
    background: var(--color-bg-secondary);
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    color: var(--color-text-primary);
    flex-shrink: 0;
    line-height: 1;
    transition: background 0.1s;
  }
  .count-btn:active { background: var(--color-bg-tertiary); transform: scale(0.94); }
  .count-val {
    font-size: 20px;
    font-weight: 600;
    color: var(--color-text-primary);
    min-width: 28px;
    text-align: center;
  }

  /* Buttons */
  .submit-btn {
    width: 100%;
    background: var(--green);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    padding: 15px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin: 1.75rem 0 0.875rem;
    transition: opacity 0.15s;
    letter-spacing: 0.01em;
  }
  .submit-btn:active { opacity: 0.82; }

  .secondary-btn {
    width: 100%;
    background: transparent;
    color: var(--color-text-tertiary);
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 11px;
    font-size: 13px;
    cursor: pointer;
    margin-bottom: 2rem;
    font-family: inherit;
    transition: color 0.15s, border-color 0.15s;
  }
  .secondary-btn:hover { color: var(--color-text-secondary); border-color: var(--color-border-strong); }

  /* Success */
  .centered-screen { padding: 4rem 2rem; text-align: center; }
  .icon-circle {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--green-light);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.25rem;
    font-size: 28px;
    color: var(--green);
  }
  .centered-screen h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--color-text-primary);
    margin-bottom: 10px;
  }
  .centered-screen p {
    font-size: 14px;
    color: var(--color-text-secondary);
    line-height: 1.7;
  }
  .ghost-btn {
    margin-top: 1.75rem;
    background: transparent;
    border: 0.5px solid var(--color-border-strong);
    border-radius: var(--radius-lg);
    padding: 11px 24px;
    font-size: 13px;
    cursor: pointer;
    color: var(--color-text-secondary);
    font-family: inherit;
  }

  /* Admin */
  .admin-header {
    padding: 1.25rem 1.25rem 0.875rem;
    border-bottom: 0.5px solid var(--color-border);
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .admin-header h2 { font-size: 17px; font-weight: 600; }
  .admin-header .count-badge { font-size: 12px; color: var(--color-text-tertiary); }

  .nav-tab { display: flex; gap: 6px; padding: 0 1.25rem; margin-bottom: 1.25rem; }
  .tab-btn {
    flex: 1; padding: 9px;
    font-size: 13px;
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-md);
    background: transparent;
    color: var(--color-text-secondary);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .tab-btn.active {
    background: var(--green-light);
    color: var(--green-dark);
    border-color: var(--green);
    font-weight: 500;
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    padding: 0 1.25rem;
    margin-bottom: 1.5rem;
  }
  .metric-card {
    background: var(--color-bg-secondary);
    border-radius: var(--radius-md);
    padding: 14px;
  }
  .metric-card .m-label { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 4px; }
  .metric-card .m-val { font-size: 28px; font-weight: 600; color: var(--color-text-primary); line-height: 1; }
  .metric-card .m-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 4px; }

  .section-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--color-text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 0 1.25rem;
    margin-bottom: 8px;
  }

  .card-list {
    margin: 0 1.25rem 1.5rem;
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--color-bg);
  }
  .card-row {
    display: flex; align-items: center;
    padding: 11px 14px;
    border-bottom: 0.5px solid var(--color-border);
    gap: 8px;
  }
  .card-row:last-child { border-bottom: none; }
  .row-name { font-size: 13px; font-weight: 500; flex: 1; }
  .pill {
    font-size: 11px; padding: 3px 9px;
    border-radius: 999px; white-space: nowrap;
  }
  .pill-green { background: var(--green-light); color: var(--green-dark); }
  .pill-blue { background: var(--blue-light); color: var(--blue-dark); margin-left: 4px; }
  .pill-gray { background: var(--color-bg-secondary); color: var(--color-text-tertiary); }

  .chart-wrap { margin: 0 1.25rem 1.5rem; position: relative; height: 210px; }

  /* Legend */
  .legend {
    display: flex; gap: 16px;
    padding: 0 1.25rem;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--color-text-secondary);
  }
  .legend-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 2px;
    margin-right: 5px;
    vertical-align: middle;
  }

  .response-item {
    padding: 12px 14px;
    border-bottom: 0.5px solid var(--color-border);
  }
  .response-item:last-child { border-bottom: none; }
  .r-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
  .r-name { font-size: 13px; font-weight: 500; }
  .r-meta { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 3px; }
  .r-detail { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--color-text-tertiary); padding: 4px 6px; border-radius: 4px;
    font-size: 15px; line-height: 1;
  }
  .del-btn:hover { color: var(--color-danger); background: #fdf0ef; }

  .empty-state {
    text-align: center; padding: 2.5rem 1rem;
    color: var(--color-text-tertiary); font-size: 13px; line-height: 1.6;
  }

  .danger-btn {
    width: calc(100% - 2.5rem);
    margin: 0 1.25rem 1.25rem;
    background: transparent;
    color: var(--color-danger);
    border: 0.5px solid rgba(192,57,43,0.3);
    border-radius: var(--radius-lg);
    padding: 11px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>
<div class="container">

  <!-- 填寫表單 -->
  <div id="page-form" class="page active">
    <div class="header">
      <div class="header-tag">紀家見面會 · 2026</div>
      <h1>紀沐煦滿四個月了<br>紀家見面會聚餐</h1>
      <p>請於 <strong>6月7日</strong> 前完成填寫。<br>每個家庭填寫一份即可。</p>
    </div>
    <div class="form-body">
      <div class="field">
        <label>所屬家族 <span class="req">*</span></label>
        <select id="family">
          <option value="">請選擇家族</option>
          <option>許鳳英</option>
          <option>紀瑞熙</option>
          <option>紀振芳</option>
          <option>紀志儒</option>
          <option>紀麗華</option>
          <option>紀富男</option>
        </select>
      </div>
      <div class="field">
        <label>填寫人姓名 <span class="req">*</span></label>
        <input type="text" id="name" placeholder="請填寫您的姓名">
      </div>
      <div class="field">
        <label>出席人數 <span class="req">*</span></label>
        <div class="date-cards">
          <div class="date-card selected" id="card-712">
            <div class="date-card-top">
              <div class="date-checkbox" id="chk-712"><i class="ti ti-check"></i></div>
              <div>
                <div class="date-label">7月12日（日）</div>
                <div class="date-sub">請填寫出席人數</div>
              </div>
            </div>
            <div class="date-counts" id="cnt-712" style="display:flex">
              <div class="count-group">
                <label>大人（18歲以上）</label>
                <div class="count-row">
                  <button class="count-btn" onclick="adjust('712','a',-1,event)">−</button>
                  <span class="count-val" id="val-712a">1</span>
                  <button class="count-btn" onclick="adjust('712','a',1,event)">+</button>
                </div>
              </div>
              <div class="count-group">
                <label>小孩（18歲以下）</label>
                <div class="count-row">
                  <button class="count-btn" onclick="adjust('712','k',-1,event)">−</button>
                  <span class="count-val" id="val-712k">0</span>
                  <button class="count-btn" onclick="adjust('712','k',1,event)">+</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="field">
        <label>備註（選填）</label>
        <textarea id="note" placeholder="例如：行動不便需無障礙座位、其他需求..."></textarea>
      </div>
      <button class="submit-btn" onclick="submitForm()">確認送出</button>
      <button class="secondary-btn" onclick="goAdmin()">管理員後台 →</button>
    </div>
  </div>

  <!-- 送出成功 -->
  <div id="page-success" class="page">
    <div class="centered-screen">
      <div class="icon-circle"><i class="ti ti-check"></i></div>
      <h2>登記完成！</h2>
      <p>感謝填寫。<br>若需更改請聯絡主辦人。<br><br>期待與大家相見！🎉</p>
      <button class="ghost-btn" onclick="goPage('form')">返回表單</button>
    </div>
  </div>

  <!-- 管理員密碼 -->
  <div id="page-pass" class="page">
    <div class="centered-screen">
      <h2 style="margin-bottom:1.25rem">管理員後台</h2>
      <input type="password" id="pass-input" placeholder="請輸入管理員密碼" onkeydown="if(event.key==='Enter')checkPass()" style="margin-bottom:10px">
      <div class="pass-err" id="pass-err" style="font-size:12px;color:var(--color-danger);margin-bottom:10px;min-height:18px"></div>
      <button class="submit-btn" style="margin-top:0" onclick="checkPass()">進入</button>
      <button class="ghost-btn" onclick="goPage('form')">← 返回</button>
    </div>
  </div>

  <!-- 管理員後台 -->
  <div id="page-admin" class="page">
    <div class="admin-header">
      <h2>管理員後台</h2>
      <span class="count-badge" id="admin-count"></span>
    </div>
    <div class="nav-tab">
      <button class="tab-btn active" id="tab-overview" onclick="switchTab('overview')">統計總覽</button>
      <button class="tab-btn" id="tab-records" onclick="switchTab('records')">所有回覆</button>
    </div>

    <div id="admin-overview">
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="m-label">7/12 出席</div>
          <div class="m-val" id="m-712">0</div>
          <div class="m-sub">人</div>
        </div>
        <div class="metric-card">
          <div class="m-label">已回覆家族</div>
          <div class="m-val" id="m-replied">0</div>
          <div class="m-sub">/ 6 個家族</div>
        </div>
      </div>

      <div class="section-title">各家族出席狀況</div>
      <div class="card-list" id="family-table"></div>

      <div class="chart-wrap">
        <canvas id="attendChart" role="img" aria-label="各家族7月12日出席人數長條圖">出席人數統計圖</canvas>
      </div>
    </div>

    <div id="admin-records" style="display:none">
      <div class="card-list" id="response-list"></div>
      <button class="danger-btn" onclick="if(confirm('確定清除所有資料？此動作無法復原。'))clearAll()">清除所有資料</button>
    </div>

    <button class="secondary-btn" style="margin:0 1.25rem 2rem;width:calc(100% - 2.5rem)" onclick="goPage('form')">← 返回表單</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const FAMILIES = ['許鳳英','紀瑞熙','紀振芳','紀志儒','紀麗華','紀富男'];
const ADMIN_PASS = '2026family';
const STORAGE_KEY = 'ji_reunion_2026';
let chartInstance = null;
// 7/12 is the only date

function goPage(p) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  if (p === 'admin') renderAdmin();
}
function goAdmin() { goPage('pass'); }
function checkPass() {
  const v = document.getElementById('pass-input').value;
  if (v === ADMIN_PASS) { document.getElementById('pass-err').textContent = ''; goPage('admin'); }
  else document.getElementById('pass-err').textContent = '密碼錯誤，請再試一次。';
}
// Date is fixed to 7/12
function adjust(day, type, delta, e) {
  e.stopPropagation();
  const el = document.getElementById('val-' + day + type);
  el.textContent = Math.max(type === 'a' ? 1 : 0, parseInt(el.textContent) + delta);
}
function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : []; } catch(e) { return []; }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function submitForm() {
  const family = document.getElementById('family').value;
  const name = document.getElementById('name').value.trim();
  if (!family) { alert('請選擇家族'); return; }
  if (!name) { alert('請填寫姓名'); return; }
  // 7/12 is the only date, always selected
  const entry = {
    id: Date.now(), family, name,
    day712: { adults: +document.getElementById('val-712a').textContent, kids: +document.getElementById('val-712k').textContent },
    note: document.getElementById('note').value.trim(),
    ts: new Date().toLocaleString('zh-TW')
  };
  const data = loadData(); data.push(entry); saveData(data);
  goPage('success');
}
function switchTab(t) {
  ['overview','records'].forEach(x => {
    document.getElementById('tab-' + x).classList.toggle('active', x === t);
    document.getElementById('admin-' + x).style.display = x === t ? '' : 'none';
  });
  if (t === 'records') renderRecords();
}
function renderAdmin() {
  const data = loadData();
  let t712 = 0;
  const fm = {}; FAMILIES.forEach(f => fm[f] = {d712:0});
  data.forEach(r => {
    const n712 = r.day712 ? r.day712.adults + r.day712.kids : 0;
    t712 += n712;
    if (fm[r.family]) { fm[r.family].d712 += n712; }
  });
  const replied = new Set(data.map(r => r.family)).size;
  document.getElementById('m-712').textContent = t712;
  document.getElementById('m-replied').textContent = replied;
  document.getElementById('admin-count').textContent = '共 ' + data.length + ' 筆回覆';
  const ft = document.getElementById('family-table');
  ft.innerHTML = '';
  FAMILIES.forEach(f => {
    const d = fm[f];
    const row = document.createElement('div'); row.className = 'card-row';
    let pills = '';
    if (d.d712 > 0) pills += `<span class="pill pill-blue">${d.d712}人 7/12</span>`;
    if (!d.d712) pills = `<span class="pill pill-gray">未回覆</span>`;
    row.innerHTML = `<span class="row-name">${f}</span>${pills}`;
    ft.appendChild(row);
  });
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const tc = isDark ? '#7a7a75' : '#9e9e99';
  const gc = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  chartInstance = new Chart(document.getElementById('attendChart'), {
    type: 'bar',
    data: {
      labels: FAMILIES,
      datasets: [
        { label: '7/12', data: FAMILIES.map(f => fm[f].d712), backgroundColor: '#378ADD', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: tc, font: { size: 11 }, autoSkip: false, maxRotation: 30 }, grid: { color: gc } },
        y: { beginAtZero: true, ticks: { color: tc, font: { size: 11 }, stepSize: 1 }, grid: { color: gc } }
      }
    }
  });
}
function renderRecords() {
  const data = loadData();
  const el = document.getElementById('response-list');
  if (!data.length) { el.innerHTML = '<div class="empty-state">尚無回覆資料</div>'; return; }
  el.innerHTML = '';
  [...data].reverse().forEach(r => {
    const div = document.createElement('div'); div.className = 'response-item';
    const d712 = r.day712 ? `7/12：${r.day712.adults}大${r.day712.kids}小` : '—';
    const dates = d712;
    div.innerHTML = `
      <div class="r-top"><span class="r-name">${r.name}</span>
        <button class="del-btn" onclick="deleteEntry(${r.id})" title="刪除"><i class="ti ti-trash" style="font-size:15px"></i></button>
      </div>
      <div class="r-meta">${r.family} · ${r.ts}</div>
      <div class="r-detail">${dates}${r.note ? '　備註：' + r.note : ''}</div>`;
    el.appendChild(div);
  });
}
function deleteEntry(id) {
  if (!confirm('確定刪除這筆資料？')) return;
  saveData(loadData().filter(r => r.id !== id));
  renderRecords(); renderAdmin();
}
function clearAll() { saveData([]); renderRecords(); renderAdmin(); }
</script>
</body>
</html>
